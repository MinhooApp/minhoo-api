<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhoo - View Message</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

      :root {
        --bg-color: #f9f9f9;
        --text-color: #000;
        --secondary-text: #333;
        --highlight-color: #f9a825;
        --button-bg: #f9a825;
        --button-text: #000;
        --button-outline-text: #000;
        --button-outline-border: #f9a825;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #000;
          --text-color: #fff;
          --secondary-text: #ccc;
          --highlight-color: #f9a825;
          --button-bg: #f9a825;
          --button-text: #000;
          --button-outline-text: #fff;
          --button-outline-border: #f9a825;
        }
      }

      body {
        margin: 0;
        background-color: var(--bg-color);
        display: grid;
        align-items: center;
        justify-items: center;
        place-items: center;
        height: 100dvh;
        font-family: "Poppins", sans-serif;
      }

      .container {
        max-width: 375px;
        padding: 30px 20px;
        border-radius: 10px;
        text-align: center;
        color: var(--text-color);
      }

      .header {
        color: #aaa;
        font-size: 12px;
        margin-bottom: 10px;
      }

      .illustration {
        width: 100%;
        height: auto;
        margin-bottom: 30px;
      }

      .title {
        font-family: "Poppins", sans-serif;
        font-size: 32px;
        color: var(--highlight-color);
        font-weight: bold;
        margin: 0;
      }

      .subtitle {
        font-family: "Poppins", sans-serif;
        font-size: 32px;
        font-weight: bold;
        margin: 0;
        color: var(--highlight-color);
      }

      .info-text {
        font-family: "Poppins", sans-serif;
        color: var(--secondary-text);
        margin: 30px 0;
        font-size: 15px;
      }

      .button {
        font-family: "Poppins", sans-serif;
        display: block;
        width: 100%;
        padding: 15px;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
        margin-bottom: 15px;
      }

      .button.primary {
        font-family: "Poppins", sans-serif;
        background-color: var(--button-bg);
        color: var(--button-text);
        border: none;
      }

      .button.secondary {
        background-color: transparent;
        color: var(--button-outline-text);
        border: 1px solid var(--button-outline-border);
      }
    </style>
  </head>
