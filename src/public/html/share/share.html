<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{pageTitle}}</title>
    <meta name="description" content="{{metaDescription}}" />
    <link rel="canonical" href="{{canonicalUrl}}" />
    <meta name="robots" content="noindex,nofollow" />
    <meta property="og:site_name" content="Minhoo" />
    <meta property="og:type" content="{{ogType}}" />
    <meta property="og:title" content="{{ogTitle}}" />
    <meta property="og:description" content="{{ogDescription}}" />
    <meta property="og:url" content="{{canonicalUrl}}" />
    <meta property="og:image" content="{{ogImage}}" />
    <meta property="og:image:alt" content="{{ogImageAlt}}" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ogTitle}}" />
    <meta name="twitter:description" content="{{ogDescription}}" />
    <meta name="twitter:image" content="{{ogImage}}" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fffdf8;
        --text: #18140d;
        --muted: #665f51;
        --accent: #f4b327;
        --border: rgba(24, 20, 13, 0.12);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #14120d;
          --text: #f7f0df;
          --muted: #d8c8a2;
          --border: rgba(247, 240, 223, 0.14);
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, rgba(244, 179, 39, 0.18), transparent 38%), var(--bg);
        color: var(--text);
      }
      main {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(100%, 420px);
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(10px);
      }
      @media (prefers-color-scheme: dark) {
        .card { background: rgba(20, 18, 13, 0.74); }
      }
      .eyebrow {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 6vw, 40px);
        line-height: 1.02;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
      }
      .actions {
        display: grid;
        gap: 12px;
        margin-top: 20px;
      }
      .btn {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 48px;
        padding: 12px 18px;
        border-radius: 999px;
        font-weight: 700;
        text-decoration: none;
      }
      .btn-primary {
        background: var(--accent);
        color: #18140d;
      }
      .btn-secondary {
        border: 1px solid var(--border);
        color: var(--text);
      }
    </style>
    <link rel="preload" href="/share/share.css" as="style" />
    <link rel="stylesheet" href="/share/share.css" />
  </head>
  <body>
    <main>
      <section
        class="card"
        data-deep-link='{{deepLinkJson}}'
        data-fallback-url='{{fallbackJson}}'
      >
        <p class="eyebrow">Open in Minhoo</p>
        <h1>{{headline}}</h1>
        <p>{{bodyText}}</p>
        <p>{{subText}}</p>
        <div class="actions">
          <a class="btn btn-primary" id="open-app" href="#">{{openAppLabel}}</a>
          <a class="btn btn-secondary" id="download-app" href="#">{{downloadAppLabel}}</a>
        </div>
      </section>
    </main>
    <script defer src="/share/share.js"></script>
  </body>
</html>
