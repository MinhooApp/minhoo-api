# Global request/connection limiting zones
limit_req_zone $binary_remote_addr zone=api_req_per_ip:20m rate=25r/s;
limit_req_zone $binary_remote_addr zone=auth_req_per_ip:20m rate=12r/s;
limit_req_zone $binary_remote_addr zone=chat_req_per_ip:20m rate=35r/s;
limit_req_zone $binary_remote_addr zone=feed_req_per_ip:20m rate=40r/s;

limit_conn_zone $binary_remote_addr zone=api_conn_per_ip:20m;
limit_conn_zone $binary_remote_addr zone=chat_conn_per_ip:20m;

limit_req_status 429;
limit_conn_status 429;
