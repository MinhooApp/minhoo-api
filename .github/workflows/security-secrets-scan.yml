name: Secrets Scan CI

on:
  push:
    branches:
      - main
      - server
  pull_request:
    branches:
      - main
      - server
  workflow_dispatch:

concurrency:
  group: secrets-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Secrets Scan
        run: npm run ops:security:scan-secrets
